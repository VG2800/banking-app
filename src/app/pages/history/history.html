<div class="card">
  <div class="card-header">
    <h3>Transaction History</h3>
  </div>

  <div class="card-body">
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Filter by Account</label>

        <select class="form-select" [(ngModel)]="selectedAccountId">
          <option value="">All Accounts</option>

          <option *ngFor="let account of accounts" [value]="account.id">
            {{ account.name }} - {{ account.type }}
          </option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Search Transactions</label>

        <input
          type="text"
          class="form-control"
          placeholder="Search by account name or amount"
          [(ngModel)]="searchTerm"
        />
      </div>
    </div>

    <div *ngIf="transactions.length === 0" class="alert alert-info">
      No transactions found.
    </div>

    <table *ngIf="transactions.length > 0" class="table table-striped">
      <thead>
        <tr>
          <th>Date</th>
          <th>From</th>
          <th>To</th>
          <th>Amount</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let transaction of transactions">
          <td>{{ transaction.date | date: "medium" }}</td>
          <td>{{ getAccountName(transaction.fromAccountId) }}</td>
          <td>{{ getAccountName(transaction.toAccountId) }}</td>
          <td>{{ transaction.amount | currency: "CAD" }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
